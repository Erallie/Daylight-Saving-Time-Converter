<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Seasonal Time Converter</title>

	<script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>

	<style>
        
        body {
            margin: 0;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
        }


        .box {
            background: #1c1c1c;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 520px;
            box-sizing: border-box;
        }

		h2 {
			margin-top: 0;
		}

        .divider {
            margin: 0;
            padding: 10px;
            text-align: center;
            font-weight: 700;
        }

		.section {
			margin: 7.5px 0px;
			padding: 12px;
			background: #2a2a2a;
			border-radius: 8px;
			transition: box-shadow 0.25s ease, border 0.25s ease;
		}

        .output {
            display: flex;
            flex-direction: row;
            width: 100%;
            gap: 10px;
        }

        .output .section {
            flex: 1;
        }

		.label {
			color: #aaa;
			font-size: 13px;
		}

		.value {
			font-size: 20px;
			margin-top: 5px;
		}

		/* ACTIVE HIGHLIGHT ONLY ON ONE SECTION */
		.active {
			border: 2px solid #60a5fa;
			box-shadow: 0 0 12px rgba(96, 165, 250, 0.35);
		}
        .generator {
            text-align: center;
            width: 100%;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.5);
            /* font-style: italic; */
            font-size: 0.8em;
        }
        a {
            color: rgba(255, 255, 255, 0.75);
            
        }
        
        a:hover {
            color: white;
        }

        @media (max-width: 600px) {
            .box {
                padding: 20px;
            }

            .output {
                flex-direction: column;
            }

            .value {
                font-size: 18px;
            }

            h2 {
                font-size: 1.5rem;
            }
        }
	</style>
</head>
<body>

<div class="box">
	<h2>Seasonal Time Converter</h2>

	<div class="section">
		<div class="label" id="inputLabel">Arizona time</div>
		<div class="value" id="input"></div>
	</div>
    <div class="divider">– Converts to –</div>
    <div class="output">
        <div class="section" id="winterBox">
            <div class="label">Local time in Winter (Nov–Mar)</div>
            <div class="value" id="winter"></div>
        </div>

        <div class="section" id="summerBox">
            <div class="label">Local time in Summer (Mar–Nov)</div>
            <div class="value" id="summer"></div>
        </div>
    </div>

    <div class="generator"><a href="generator.html">Click here</a> to generate a time.</div>
</div>

<script>
	const { DateTime } = luxon;

	function getTimeFromURL() {
		const p = new URLSearchParams(window.location.search);
		return p.get("t") || "13:00";
	}

	function getZoneFromURL() {
		const p = new URLSearchParams(window.location.search);
		return p.get("tz") || "America/Phoenix";
	}

	function parseTime(t) {
		const [h, m] = t.split(":").map(Number);
		return { h, m };
	}

	function formatTime(dateObj) {
		return DateTime.fromJSDate(dateObj).toFormat("h:mm a");
	}

	const input = getTimeFromURL();
	const fromZone = getZoneFromURL();
	const { h, m } = parseTime(input);

	const phoenixZone = "America/Phoenix";

	// interpret input time in the selected source timezone
	const sourceDate = DateTime.fromObject(
		{ year: 2024, month: 1, day: 15, hour: h, minute: m },
		{ zone: fromZone }
	);

	// convert that same moment into Arizona winter/summer display contexts
	const winter = sourceDate.setZone(phoenixZone).toJSDate();

	const summer = DateTime.fromObject(
		{ year: 2024, month: 7, day: 15, hour: h, minute: m },
		{ zone: fromZone }
	)
	.setZone(phoenixZone)
	.toJSDate();

	const inputDisplay = DateTime.fromObject(
		{ year: 2024, month: 1, day: 1, hour: h, minute: m },
		{ zone: fromZone }
	).toFormat("h:mm a");

	document.getElementById("input").innerText = `${inputDisplay}`;
	document.getElementById("inputLabel").innerText = `Time for ${fromZone}`;
	document.getElementById("winter").innerText = formatTime(winter);
	document.getElementById("summer").innerText = formatTime(summer);

	// ---------------------------
	// Highlight ONLY the active result box
	// ---------------------------
	function getActiveSeason() {
		const month = new Date().getMonth() + 1;
		return (month >= 3 && month < 11) ? "summer" : "winter";
	}

	const active = getActiveSeason();

	if (active === "winter") {
		document.getElementById("winterBox").classList.add("active");
	} else {
		document.getElementById("summerBox").classList.add("active");
	}
</script>

</body>
</html>
